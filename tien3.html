      function bindGoNogoGame() {
        var root = document.querySelector(".gng-game");
        if (!root) return;

        var readyBtn = root.querySelector(".gng-ready");
        var cdOverlay = root.querySelector(".gng-countdown-overlay");
        var cdNum = root.querySelector(".gng-count-num");
        var arenaWrap = root.querySelector(".gng-arena-wrap");
        var digitEl = root.querySelector(".gng-digit");
        var maskEl = root.querySelector(".gng-mask");
        var trialLabel = root.querySelector(".gng-trial-label");
        var resultsEl = root.querySelector(".gng-results");
        var practiceBreakEl = root.querySelector(".gng-practice-break");
        var practiceReportEl = root.querySelector(".gng-practice-report");
        var startMainBtn = root.querySelector(".gng-start-main");
        var completeRow = root.querySelector(".gng-stage-complete");

        var timeouts = [];
        var keyHandler = null;
        var PRACTICE = 25;
        var MAIN = 10;
        var TOTAL = PRACTICE + MAIN;
        var DIGIT_MS = 500;
        var RESPONSE_MS = 500;
        var FEEDBACK_MS = 800;

        function pushT(fn, ms) {
          timeouts.push(setTimeout(fn, ms));
        }

        function clearTimers() {
          timeouts.forEach(function (t) {
            clearTimeout(t);
          });
          timeouts = [];
        }

        function offKey() {
          if (keyHandler) {
            window.removeEventListener("keydown", keyHandler, true);
            keyHandler = null;
          }
        }

        var stats = { pC: 0, pW: 0, mC: 0, mW: 0 };
        var trialLog = [];

        function record(correct, isPractice) {
          if (isPractice) {
            if (correct) stats.pC++;
            else stats.pW++;
          } else {
            if (correct) stats.mC++;
            else stats.mW++;
          }
        }

        function errRuText(kind) {
          return kind === "extra"
            ? "лишнее нажатие Пробела (для цифры 3 нажимать нельзя)"
            : "пропуск Пробела (для этой цифры нужно было нажать)";
        }

        function buildErrorSection(errors, blockLabel, blockSize) {
          if (errors.length === 0) {
            return (
              "<h4>Ошибки по попыткам</h4>" +
              '<p class="gng-no-errors">Неверных ответов не было — все попытки в этом блоке верны.</p>'
            );
          }
          var errItems = errors
            .map(function (t) {
              return (
                "<li><strong>" +
                blockLabel +
                " попытка " +
                t.indexInBlock +
                " / " +
                blockSize +
                '</strong>: цифра <strong>' +
                t.digit +
                "</strong> — " +
                errRuText(t.errorKind) +
                ".</li>"
              );
            })
            .join("");
          return (
            "<h4>Ошибки по попыткам</h4>" +
            '<p class="gng-error-intro">Неверные ответы в этом блоке:</p>' +
            '<ul class="gng-error-list">' +
            errItems +
            "</ul>"
          );
        }

        readyBtn.addEventListener("click", function () {
          readyBtn.disabled = true;
          trialLog = [];
          stats.pC = 0;
          stats.pW = 0;
          stats.mC = 0;
          stats.mW = 0;
          practiceBreakEl.classList.add("gng-hidden");
          practiceReportEl.innerHTML = "";
          resultsEl.classList.add("gng-hidden");
          resultsEl.innerHTML = "";
          completeRow.classList.add("gng-hidden");
          cdOverlay.classList.remove("gng-hidden");
          cdNum.textContent = "3";
          pushT(function () {
            cdNum.textContent = "2";
          }, 1000);
          pushT(function () {
            cdNum.textContent = "1";
          }, 2000);
          pushT(function () {
            cdOverlay.classList.add("gng-hidden");
            arenaWrap.classList.remove("gng-hidden");
            clearTimers();
            runTrial(0);
          }, 3000);
        });

        function runTrial(idx) {
          offKey();
          clearTimers();

          var d = 1 + Math.floor(Math.random() * 9);
          var isPractice = idx < PRACTICE;
          trialLabel.textContent = isPractice
            ? "Пробная попытка " + (idx + 1) + " / " + PRACTICE
            : "Основная попытка " + (idx + 1 - PRACTICE) + " / " + MAIN;

          var ctx = { phase: "digit" };
          var spacePressed = false;

          maskEl.classList.remove("gng-ok", "gng-bad", "is-visible");
          digitEl.textContent = String(d);
          digitEl.style.visibility = "visible";

          keyHandler = function (e) {
            if (e.code !== "Space" && e.key !== " ") return;
            e.preventDefault();
            e.stopPropagation();
            if (ctx.phase === "digit" || ctx.phase === "mask") spacePressed = true;
          };
          window.addEventListener("keydown", keyHandler, true);

          pushT(function () {
            ctx.phase = "mask";
            digitEl.textContent = "";
            digitEl.style.visibility = "hidden";
            maskEl.classList.add("is-visible");

            pushT(function () {
              ctx.phase = "done";
              offKey();

              var ok = d === 3 ? !spacePressed : spacePressed;

              trialLog.push({
                overall: idx + 1,
                isPractice: isPractice,
                indexInBlock: isPractice ? idx + 1 : idx + 1 - PRACTICE,
                digit: d,
                correct: ok,
                errorKind: ok ? null : d === 3 ? "extra" : "miss"
              });

              record(ok, isPractice);
              if (ok) maskEl.classList.add("gng-ok");
              else maskEl.classList.add("gng-bad");

              pushT(function () {
                maskEl.classList.remove("is-visible", "gng-ok", "gng-bad");
                digitEl.style.visibility = "visible";
                var nextIdx = idx + 1;
                if (nextIdx === PRACTICE) {
                  endPracticePhase();
                } else if (nextIdx >= TOTAL) {
                  endMainPhase();
                } else {
                  runTrial(nextIdx);
                }
              }, FEEDBACK_MS);
            }, RESPONSE_MS);
          }, DIGIT_MS);
        }

        function endPracticePhase() {
          offKey();
          clearTimers();
          maskEl.classList.remove("is-visible", "gng-ok", "gng-bad");
          digitEl.textContent = "";
          arenaWrap.classList.add("gng-hidden");

          var pt = stats.pC + stats.pW;
          var pp = pt ? Math.round((100 * stats.pC) / pt) : 0;
          var practiceErrors = trialLog.filter(function (t) {
            return t.isPractice && !t.correct;
          });
          practiceReportEl.innerHTML =
            "<h3>Пробный блок завершён</h3>" +
            "<p><strong>Пробные попытки (" +
            PRACTICE +
            "):</strong> верно — " +
            stats.pC +
            ", ошибок — " +
            stats.pW +
            ", процент верных — " +
            pp +
            "%</p>" +
            buildErrorSection(practiceErrors, "Пробная", PRACTICE);
          practiceBreakEl.classList.remove("gng-hidden");
        }

        startMainBtn.addEventListener("click", function () {
          practiceBreakEl.classList.add("gng-hidden");
          arenaWrap.classList.remove("gng-hidden");
          clearTimers();
          runTrial(PRACTICE);
        });

        function endMainPhase() {
          offKey();
          clearTimers();
          maskEl.classList.remove("is-visible", "gng-ok", "gng-bad");
          digitEl.textContent = "";
          arenaWrap.classList.add("gng-hidden");

          var pt = stats.pC + stats.pW;
          var mt = stats.mC + stats.mW;
          var pp = pt ? Math.round((100 * stats.pC) / pt) : 0;
          var mp = mt ? Math.round((100 * stats.mC) / mt) : 0;
          var mainErrors = trialLog.filter(function (t) {
            return !t.isPractice && !t.correct;
          });

          resultsEl.innerHTML =
            "<h3>Основной блок завершён</h3>" +
            "<p><strong>Основные попытки (" +
            MAIN +
            "):</strong> верно — " +
            stats.mC +
            ", ошибок — " +
            stats.mW +
            ", процент верных — " +
            mp +
            "%</p>" +
            buildErrorSection(mainErrors, "Основная", MAIN) +
            "<p class=\"gng-error-intro\" style=\"margin-top:1rem\"><strong>Пробный блок (справочно):</strong> " +
            stats.pC +
            " верно из " +
            pt +
            " (" +
            pp +
            "%).</p>";
          resultsEl.classList.remove("gng-hidden");
          completeRow.classList.remove("gng-hidden");

          setTimeout(function () {
            showCelebrationOverlay({
              headline: stats.mC + " из " + mt,
              sublines: [
                "Верно в основном блоке — " + mp + "%",
                "Пробные: " + stats.pC + " из " + pt + " (" + pp + "%)",
                "Фейерверк — затем завершите этап."
              ]
            });
          }, 450);
        }
      }

      function bindCRT() {
        var root = document.querySelector(".crt-test");
        if (!root) {
          crtOnStage2Open = function () {};
          return;
        }

        var CRT_ANSWER_KEY = ["c", "a", "b"];

        var qMetrics = {
          t0: [null, null, null],
          firstClickMs: [null, null, null],
          choice: [null, null, null]
        };

        function scoreCRTChoices(choices) {
          var correct = 0;
          for (var i = 0; i < 3; i++) {
            if (choices[i] === CRT_ANSWER_KEY[i]) correct++;
          }
          return { correct: correct, wrong: 3 - correct };
        }

        function markQuestionStart(idx) {
          if (idx < 0 || idx > 2) return;
          if (qMetrics.t0[idx] == null) qMetrics.t0[idx] = performance.now();
        }

        function onAnswerPick(idx) {
          if (qMetrics.firstClickMs[idx] != null) return;
          if (qMetrics.t0[idx] == null) markQuestionStart(idx);
          if (qMetrics.t0[idx] == null) return;
          qMetrics.firstClickMs[idx] = Math.round(performance.now() - qMetrics.t0[idx]);
        }

        function persistCRTMetrics(score) {
          var byQ = [];
          for (var i = 0; i < 3; i++) {
            var ch = qMetrics.choice[i];
            var ok = ch === CRT_ANSWER_KEY[i];
            byQ.push({
              q: i + 1,
              choice: ch,
              isCorrect: ok,
              reactionMs: qMetrics.firstClickMs[i]
            });
          }
          var data = {
            at: new Date().toISOString(),
            total: 3,
            correctCount: score.correct,
            wrongCount: score.wrong,
            reactionMs: [qMetrics.firstClickMs[0], qMetrics.firstClickMs[1], qMetrics.firstClickMs[2]],
            choices: [qMetrics.choice[0], qMetrics.choice[1], qMetrics.choice[2]],
            byQuestion: byQ
          };
          try {
            localStorage.setItem(CRT_METRICS_KEY, JSON.stringify(data));
          } catch (err) {}
        }

        crtOnStage2Open = function () {
          markQuestionStart(0);
        };

        var st2 = document.querySelector('.stage[data-stage="2"]');
        if (st2 && st2.classList.contains("is-open")) markQuestionStart(0);

        function wireQuestion(n) {
          var block = root.querySelector('.crt-q[data-question="' + n + '"]');
          if (!block) return;
          var btn = block.querySelector(".crt-send");
          var fb = block.querySelector(".crt-feedback");
          var next = root.querySelector('.crt-q[data-question="' + (n + 1) + '"]');
          var complete = root.querySelector(".crt-complete");
          if (!btn || !fb) return;

          var idx = n - 1;
          block.querySelectorAll('input[type="radio"]').forEach(function (inp) {
            inp.addEventListener("change", function () {
              onAnswerPick(idx);
            });
          });

          btn.addEventListener("click", function () {
            var sel = block.querySelector('input[type="radio"]:checked');
            if (!sel) {
              fb.hidden = false;
              fb.className = "crt-feedback crt-neutral";
              fb.textContent = "Выберите один из вариантов.";
              return;
            }
            qMetrics.choice[idx] = sel.value;
            fb.hidden = true;
            fb.textContent = "";
            block.querySelectorAll('input[type="radio"]').forEach(function (inp) {
              inp.disabled = true;
            });
            btn.disabled = true;
            if (n < 3 && next) {
              next.hidden = false;
              markQuestionStart(n);
            }
            if (n === 3 && complete) {
              var score = scoreCRTChoices(qMetrics.choice);
              var scoreBox = root.querySelector("#crt-score-summary");
              if (scoreBox) {
                scoreBox.hidden = false;
                scoreBox.innerHTML =
                  '<p class="crt-score-main">Верных ответов: ' +
                  score.correct +
                  " из 3. Неверных: " +
                  score.wrong +
                  ".</p>" +
                  '<p class="crt-score-detail">Нажмите «Завершить второй этап» ниже, чтобы перейти к этапу 3.</p>';
              }
              complete.hidden = false;
              persistCRTMetrics(score);
              updateCompleteButtonsState();
            }
          });
        }

        wireQuestion(1);
        wireQuestion(2);
        wireQuestion(3);
      }

      function bindStageToggles() {
        document.querySelectorAll(".stage:not(.is-locked) .stage-head").forEach(function (head) {
          head.addEventListener("click", function () {
            var stage = head.closest(".stage");
            var sid = stage.dataset.stage;
            var open = stage.classList.toggle("is-open");
            head.setAttribute("aria-expanded", open ? "true" : "false");
            if (sid === "1" && !open) {
              exitStage1ShortFullscreen();
            }
            if (open) notifyStageOpened(sid);
          });
        });
      }

      function bindTabs() {
        document.querySelectorAll(".tab").forEach(function (tab) {
          tab.addEventListener("click", function () {
            var rootSeries = tab.closest(".video-series");
            if (!rootSeries) return;
            var name = tab.getAttribute("data-tab");
            rootSeries.querySelectorAll(".tab").forEach(function (t) {
              t.setAttribute("aria-selected", t === tab ? "true" : "false");
            });
            rootSeries.querySelectorAll(".video-panel").forEach(function (p) {
              p.classList.toggle("is-active", p.getAttribute("data-panel") === name);
            });
            if (rootSeries.getAttribute("data-series") === "stage1" && name === "long") {
              markStage1LongVideoVisited();
              updateCompleteButtonsState();
            }
          });
        });
      }

      function bindStage1GotoLong() {
        document.querySelectorAll(".stage1-goto-long-video").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var series =
              btn.closest(".video-series") ||
              document.querySelector('.video-series[data-series="stage1"]');
            if (!series) return;
            var shortPanel = series.querySelector('.video-panel[data-panel="short"]');
            var longPanel = series.querySelector('.video-panel[data-panel="long"]');
            if (shortPanel) shortPanel.classList.remove("is-active");
            if (longPanel) longPanel.classList.add("is-active");
            markStage1LongVideoVisited();
            updateCompleteButtonsState();
          });
        });
      }

      function bindComplete() {
        document.querySelectorAll(".btn-complete").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var s = parseInt(btn.getAttribute("data-stage"), 10);
            if (!isFinite(s)) return;
            var max = getMaxUnlocked();
            if (s !== max) return;
            if (
              s === 1 &&
              max === 1 &&
              (!hasStage1ShortsCompleted() || !hasStage1LongVideoVisited())
            ) {
              return;
            }
            if (s < 7) setMaxUnlocked(max + 1);
            render();
          });
        });
      }

      document.getElementById("resetProgress").addEventListener("click", function () {
        clearStage3BreakTimer();
        clearStage5BreakTimer();
        localStorage.removeItem(STORAGE_KEY);
        try {
          localStorage.removeItem(STAGE1_SHORTS_DONE_KEY);
          localStorage.removeItem(STAGE1_LONG_KEY);
        } catch (err) {}
        try {
          localStorage.removeItem(CRT_METRICS_KEY);
        } catch (err) {}
        render();
      });

      render();
    })();
  </script>
</body>
</html>
