<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Задача Струпа</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f2ef;
      --surface: #fff;
      --border: #e0dcd6;
      --text: #1a1a1a;
      --muted: #5c5854;
      --accent: #8b4513;
      --accent-soft: #c4a574;
      --locked: #b0aba5;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 52rem;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }
    h1 {
      font-size: 1.65rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
      letter-spacing: -0.02em;
      text-align: center;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0 auto 1.75rem;
      text-align: center;
      max-width: 40rem;
    }
    .stage-list {
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }
    .stage {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      contain: layout style;
    }
    .stage.is-locked {
      opacity: 0.52;
      background: #e8e6e3;
      border-style: dashed;
      border-color: var(--locked);
      user-select: none;
    }
    .stage.is-locked,
    .stage.is-locked * {
      pointer-events: none !important;
    }
    .stage.is-locked .stage-body {
      display: none !important;
      visibility: hidden;
      max-height: 0 !important;
      padding: 0 !important;
      margin: 0 !important;
      border: 0 !important;
      overflow: hidden !important;
    }
    .stage-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      width: 100%;
      padding: 1rem 1.15rem;
      font: inherit;
      font-weight: 600;
      text-align: left;
      background: transparent;
      border: none;
      cursor: pointer;
      color: inherit;
    }
    .stage.is-locked .stage-head {
      cursor: not-allowed;
      color: var(--locked);
    }
    .stage:not(.is-locked) .stage-head:hover {
      background: rgba(139, 69, 19, 0.06);
    }
    .stage-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 6px;
      background: var(--accent-soft);
      color: #2c1810;
      font-size: 0.8rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    .stage.is-locked .stage-num {
      background: #ddd9d4;
      color: var(--locked);
    }
    .stage-title-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex: 1;
    }
    .chev {
      flex-shrink: 0;
      transition: transform 0.2s ease;
      color: var(--muted);
    }
    .stage.is-open:not(.is-locked) .chev { transform: rotate(180deg); }
    .stage-body {
      display: none;
      padding: 0 1.15rem 1.15rem;
      border-top: 1px solid var(--border);
    }
    .stage.is-open:not(.is-locked) .stage-body { display: block; }
    .badge-locked {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--locked);
      border: 1px solid var(--border);
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
    }
    .video-series { margin-top: 1rem; }
    .video-series:first-child { margin-top: 0.5rem; }
    .stage1-short-title {
      width: 100%;
      margin: 0 0 0.9rem;
      padding: 0;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }
    .series-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .tab-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }
    .tab {
      padding: 0.45rem 0.85rem;
      font: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      cursor: pointer;
      color: var(--text);
    }
    .tab:hover { border-color: var(--accent-soft); }
    .tab[aria-selected="true"] {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .video-panel {
      display: none;
      border: 1px dashed var(--border);
      border-radius: 8px;
      min-height: 200px;
      background: #faf9f7;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .video-panel.is-active { display: flex; }
    .video-panel.video-panel-short {
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0.65rem 0.85rem 1rem;
      min-height: 0;
      max-height: none;
      overflow: visible;
    }
    .video-panel.video-panel-long {
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
    }
    .long-video-wrap {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    }
    .long-video-intro {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.45;
      margin: 0 0 0.75rem;
    }
    .long-video-slot {
      aspect-ratio: 16 / 9;
      border: 2px dashed var(--border);
      border-radius: 8px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .long-video-slot strong {
      font-size: 1.05rem;
      color: var(--text);
    }
    .stage1-long-complete {
      margin-top: 1.25rem;
      flex-shrink: 0;
    }
    .video-panel video,
    .video-panel iframe {
      max-width: 100%;
      border-radius: 6px;
    }
    .short-feed-wrap {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: min(100%, 420px);
      margin: 0 auto;
    }
    .short-feed {
      flex: 0 0 auto;
      min-height: 0;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0d0d0d;
    }
    .short-feed.short-feed-one {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: visible;
      padding: 0.65rem;
      box-sizing: border-box;
    }
    .short-one-inner {
      position: relative;
      width: 100%;
      max-width: min(100%, 420px);
      display: block;
      touch-action: pan-y;
    }
    .short-slide-inner {
      position: relative;
      width: 100%;
      max-width: min(100%, 360px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .short-feed-video {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center center;
      border-radius: 8px;
      background: #000;
      vertical-align: top;
    }
    .stage1-goto-long-video {
      margin-top: 0.75rem;
      width: 100%;
      max-width: min(100%, 420px);
      align-self: center;
      box-sizing: border-box;
    }
    .short-slide-badge {
      position: absolute;
      top: 0.35rem;
      right: 0.35rem;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      pointer-events: none;
    }
    .short-video-missing {
      margin: 0;
      padding: 1rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      background: #1a1a1a;
      border-radius: 8px;
      width: 100%;
    }
    .short-next-hint {
      position: absolute;
      left: 50%;
      bottom: 0.55rem;
      transform: translateX(-50%);
      z-index: 4;
      width: 3.25rem;
      height: 3.25rem;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      color: #1a1a1a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
      padding: 0;
      animation: short-next-blink 1s ease-in-out infinite;
    }
    .short-next-hint:hover {
      background: #fff;
    }
    .short-next-hint-arrow {
      font-size: 1.35rem;
      line-height: 1;
      font-weight: 700;
      display: block;
      margin-top: 2px;
    }
    @keyframes short-next-blink {
      0%, 100% { opacity: 0.55; transform: translateX(-50%) translateY(0); }
      50% { opacity: 1; transform: translateX(-50%) translateY(4px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .short-next-hint {
        animation: none;
        opacity: 1;
      }
      .celebration-headline {
        animation: none;
      }
    }
    @media (hover: none) and (pointer: coarse) {
      .short-next-hint {
        display: none !important;
      }
    }
    .short-swipe-hint-mobile {
      display: none;
      margin: 0.5rem 0 0;
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
    }
    @media (hover: none) and (pointer: coarse) {
      .short-swipe-hint-mobile {
        display: block;
      }
    }
    .stage1-short-fs-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      align-items: stretch;
    }
    /* Телефон: отдельный полноэкранный слой для коротких роликов (вне списка этапов) */
    @media (hover: none) and (pointer: coarse) {
      body.stage1-short-fs-active {
        overflow: hidden;
        touch-action: none;
      }
      #stage1-short-fs-shell.stage1-short-fs-shell--open {
        position: fixed;
        inset: 0;
        z-index: 999998;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        width: 100%;
        max-width: none;
        margin: 0;
        padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px)
          max(0.35rem, env(safe-area-inset-bottom, 0px)) env(safe-area-inset-left, 0px);
        box-sizing: border-box;
        background: #000;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }
      #stage1-short-fs-shell.stage1-short-fs-shell--open .stage1-short-title {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      #stage1-short-fs-shell.stage1-short-fs-shell--open .video-panel.video-panel-short {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        flex: 1 1 auto;
        min-height: 0;
        padding: 0;
        border: none;
        border-radius: 0;
        background: transparent;
        overscroll-behavior-y: contain;
      }
      #stage1-short-fs-shell.stage1-short-fs-shell--open .short-feed-wrap {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        min-height: 0;
        max-width: none;
        width: 100%;
        margin: 0;
        overscroll-behavior-y: contain;
      }
      #stage1-short-fs-shell.stage1-short-fs-shell--open .short-feed.short-feed-one {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 0;
        border: none;
        border-radius: 0;
        background: #000;
        overscroll-behavior-y: contain;
      }
      #stage1-short-fs-shell.stage1-short-fs-shell--open .short-one-inner {
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        max-width: none;
        width: 100%;
        min-height: 0;
        touch-action: none;
      }
      #stage1-short-fs-shell.stage1-short-fs-shell--open .short-slide-inner {
        max-width: none;
        width: 100%;
        flex: 1 1 auto;
        min-height: 0;
        align-self: stretch;
      }
      #stage1-short-fs-shell.stage1-short-fs-shell--open .short-feed-video {
        width: 100%;
        height: 100%;
        min-height: 0;
        flex: 1 1 auto;
        max-height: none;
        object-fit: cover;
        object-position: center;
        border-radius: 0;
        touch-action: manipulation;
        -webkit-touch-callout: none;
      }
      #stage1-short-fs-shell.stage1-short-fs-shell--open .short-swipe-hint-mobile {
        flex-shrink: 0;
        padding: 0.35rem 0.75rem 0;
        margin: 0;
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.78rem;
      }
      #stage1-short-fs-shell.stage1-short-fs-shell--open .stage1-goto-long-video {
        display: none;
      }
      .stage[data-stage="1"].is-open .stage-body {
        overflow-x: hidden;
      }
      .stage[data-stage="1"] .stage1-goto-long-video:not([hidden]) {
        max-width: min(100%, 420px);
        margin-left: auto;
        margin-right: auto;
      }
    }
    .placeholder-msg {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .stroop-embed {
      margin-top: 1.75rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }
    .stroop-embed h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 1.25rem 0 0.75rem;
      color: var(--text);
    }
    .stroop-embed h2:first-child { margin-top: 0; }
    .stroop-embed .admonitionblock > table {
      border-collapse: separate;
      border: 0;
      width: 100%;
      margin: 0;
    }
    .stroop-embed .admonitionblock td.icon {
      width: 2.75rem;
      vertical-align: top;
      text-align: center;
      padding-top: 0.15rem;
    }
    .stroop-embed .admon-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      background: var(--accent-soft);
      color: #2c1810;
      font-size: 0.85rem;
      font-weight: 700;
      line-height: 1;
    }
    .stroop-embed .admonitionblock td.content {
      padding: 0 0 0 0.5rem;
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--text);
    }
    .stroop-embed .sidebarblock {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
      background: #faf9f7;
    }
    .stroop-embed .sidebarblock .title { text-align: center; margin-bottom: 0.5rem; }
    .stroop-embed .sidebarblock .paragraph { margin: 0; }
    .stroop-embed .stroop-launch-wrap {
      text-align: center;
      margin: 0.25rem 0 0.5rem;
    }
    .stroop-embed .stroop-launch-img {
      display: block;
      margin: 0 auto 0.85rem;
      max-width: min(100%, 320px);
      width: auto;
      height: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .stroop-embed .stroop-launch-link {
      margin: 0;
      font-size: 0.98rem;
      line-height: 1.45;
    }
    .stroop-embed .sidebarblock a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: underline;
    }
    .stroop-embed .paragraph {
      margin: 0.75rem 0;
      font-size: 0.95rem;
      line-height: 1.55;
    }
    .stroop-embed .paragraph p { margin: 0; }
    .stroop-embed table.tableblock {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      font-size: 0.9rem;
      margin: 0.5rem 0 0;
    }
    .stroop-embed table.tableblock th,
    .stroop-embed table.tableblock td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.65rem;
      vertical-align: top;
    }
    .stroop-embed table.tableblock thead { background: #f0ece6; }
    .stroop-embed table.tableblock .tableblock { margin: 0; }
    .complete-row {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
    }
    .btn-primary {
      font: inherit;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.55rem 1.1rem;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }
    @media (hover: hover) {
      .btn-primary:hover {
        filter: brightness(1.05);
      }
    }
    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .hint {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .placeholder-stage {
      color: var(--muted);
      font-size: 0.95rem;
      padding: 0.5rem 0;
    }
    .reset-hint {
      margin: 0.5rem 0 0;
      font-size: 0.8rem;
      color: var(--muted);
      max-width: 36rem;
    }
    .reset-row {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .btn-ghost {
      font: inherit;
      font-size: 0.8rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }
    .btn-ghost:hover { color: var(--accent); }
    .crt-test { margin-top: 0.25rem; }
    .crt-intro {
      font-size: 0.95rem;
      color: var(--muted);
      margin: 0 0 1.25rem;
      line-height: 1.5;
    }
    .crt-q {
      margin-bottom: 1.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .crt-q.crt-q-last { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .crt-label { font-weight: 600; margin: 0 0 0.35rem; }
    .crt-stem { margin: 0 0 1rem; font-size: 0.95rem; line-height: 1.55; }
    .crt-options {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .crt-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: var(--bg);
    }
    .crt-option input { flex-shrink: 0; }
    .crt-send { margin-bottom: 0.75rem; }
    .crt-send:disabled { opacity: 0.55; cursor: not-allowed; }
    .crt-feedback { margin: 0; font-size: 0.9rem; font-weight: 600; }
    .crt-feedback.crt-correct { color: #1b6b3a; }
    .crt-feedback.crt-wrong { color: #a32020; }
    .crt-feedback.crt-neutral { color: var(--muted); font-weight: 500; }
    .crt-score-summary {
      margin-top: 1.25rem;
      padding: 1rem 1.1rem;
      border-radius: 8px;
      background: #f0ece6;
      border: 1px solid var(--border);
    }
    .crt-score-summary[hidden] {
      display: none !important;
    }
    .crt-score-summary .crt-score-main {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }
    .crt-score-summary .crt-score-detail {
      margin: 0.4rem 0 0;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .crt-complete { margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .crt-complete[hidden] { display: none !important; }
    .crt-q[hidden] { display: none !important; }
    .break-panel {
      text-align: center;
      padding: 0.5rem 0 0.25rem;
    }
    .break-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
    }
    .break-desc {
      margin: 0 0 1.25rem;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .break-countdown {
      font-variant-numeric: tabular-nums;
      font-size: 3rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--accent);
      line-height: 1.2;
    }
    .break-panel.break-done .break-desc { margin-bottom: 0; color: var(--text); }
    .crt-metrics-panel {
      margin-bottom: 1.5rem;
      padding: 1rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #faf9f7;
      font-size: 0.95rem;
      line-height: 1.55;
    }
    .crt-metrics-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 0.65rem;
    }
    .crt-metrics-panel p { margin: 0.4rem 0; }
    .crt-metrics-list {
      margin: 0.35rem 0 0.5rem 1.1rem;
      padding: 0;
    }
    .crt-metrics-list li { margin: 0.25rem 0; }
    .gng-game { margin-top: 0.25rem; }
    .gng-desc {
      margin-bottom: 1.25rem;
      padding: 1rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 8px;

<body>
  <div class="wrap">
    <h1>Задача Струпа</h1>
    <p class="subtitle">Семь этапов. Этапы 3 и 5 — перерыв ~1 минута. Этап 6 — игра «цифра / × в круге» (Пробел). Демонстрация Струпа и таблица — на этапе 4.</p>

    <div class="stage-list" id="stages"></div>

    <div class="reset-row">
      <button type="button" class="btn-ghost" id="resetProgress">Сбросить прогресс (для проверки)</button>
      <p class="reset-hint">Если все этапы выглядят открытыми, нажмите сброс: прогресс хранится в браузере (ключ <code>courseMaxUnlockedStage</code>).</p>
    </div>
  </div>

  <template id="tpl-stage1-inner">
    <div class="stage1-inner">
      <div class="video-series" data-series="stage1">
        <div id="stage1-short-fs-mount" class="stage1-short-fs-mount">
          <div id="stage1-short-fs-shell" class="stage1-short-fs-shell">
            <h2 class="stage1-short-title">Короткий видеоролик</h2>
            <div
              class="video-panel video-panel-short is-active"
              data-series="stage1"
              data-panel="short"
              role="region"
              aria-label="Короткий видеоролик"
            >
              <div class="short-feed-wrap">
                <div class="short-feed short-feed-one" id="stage1-short-feed" aria-label="Короткие видео 1–7 по очереди">
                  <div class="short-slide-inner short-one-inner" id="stage1-short-touch">
                    <video
                      id="stage1-short-video"
                      class="short-feed-video"
                      controls
                      playsinline
                      preload="auto"
                    ></video>
                    <p class="short-video-missing" id="stage1-short-miss" hidden></p>
                    <span class="short-slide-badge" id="stage1-short-badge">1 / 7</span>
                    <button
                      type="button"
                      class="short-next-hint"
                      id="stage1-short-next-hint"
                      hidden
                      aria-label="Следующее видео"
                      title="Следующее видео"
                    >
                      <span class="short-next-hint-arrow" aria-hidden="true">▼</span>
                    </button>
                  </div>
                </div>
                <p class="short-swipe-hint-mobile">Свайп вверх — следующее видео · свайп вниз — предыдущее</p>
              </div>
              <button
                type="button"
                class="btn-primary stage1-goto-long-video"
                id="stage1-goto-long-video"
                hidden
              >
                Перейти в длинный видеоролик
              </button>
            </div>
          </div>
        </div>
        <div class="video-panel video-panel-long" data-series="stage1" data-panel="long" role="region" aria-label="Длинный видеоролик">
          <div class="long-video-wrap">
            <p class="long-video-intro">Длинный ролик будет здесь. Пока файл не подключён.</p>
            <div class="long-video-slot" role="img" aria-label="Место для длинного видео">
              <strong>Длинный видеоролик</strong>
              <span>Файл добавят позже</span>
            </div>
          </div>
          <div class="complete-row stage1-long-complete">
            <button type="button" class="btn-primary btn-complete" data-stage="1">Завершить первый этап</button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-stage2-inner">
    <div class="crt-test">
      <p class="crt-intro">Тест CRT (когнитивная рефлексия). Три задания: выберите вариант и нажмите «Далее» или «Готово». Во время заданий верность не показывается. После третьего ответа отображается только общий счёт (верно / неверно), затем нажмите «Завершить второй этап», чтобы открыть этап 3.</p>

      <div class="crt-q" data-question="1">
        <p class="crt-label">Задание 1</p>
        <p class="crt-stem">Бейсбольная бита и мяч стоят вместе $1.10 (1 доллар и 10 центов). Бита стоит на 1 доллар больше, чем мяч. Сколько стоит мяч (в центах)?</p>
        <div class="crt-options" role="radiogroup" aria-label="Задание 1">
          <label class="crt-option"><input type="radio" name="crt-q1" value="a"> 6%</label>
          <label class="crt-option"><input type="radio" name="crt-q1" value="b"> 7%</label>
          <label class="crt-option"><input type="radio" name="crt-q1" value="c"> 5%</label>
        </div>
        <button type="button" class="btn-primary crt-send" data-question="1">Далее</button>
        <p class="crt-feedback" id="crt-fb-1" hidden></p>
      </div>

      <div class="crt-q" data-question="2" hidden>
        <p class="crt-label">Задание 2</p>
        <p class="crt-stem">5 машин производят 5 штуковин за 5 минут. За какое время (в минутах) 100 машин произведут 100 штуковин?</p>
        <div class="crt-options" role="radiogroup" aria-label="Задание 2">
          <label class="crt-option"><input type="radio" name="crt-q2" value="a"> 5 мин</label>
          <label class="crt-option"><input type="radio" name="crt-q2" value="b"> 6 мин</label>
          <label class="crt-option"><input type="radio" name="crt-q2" value="c"> 7 мин</label>
        </div>
        <button type="button" class="btn-primary crt-send" data-question="2">Далее</button>
        <p class="crt-feedback" id="crt-fb-2" hidden></p>
      </div>

      <div class="crt-q crt-q-last" data-question="3" hidden>
        <p class="crt-label">Задание 3</p>
        <p class="crt-stem">В озере есть участок, зарастающий кувшинками. Каждый день заросший участок увеличивается в 2 раза. Если за 48 дней кувшинки покроют всё озеро полностью, то сколько дней потребуется, чтобы кувшинки заняли половину озера?</p>
        <div class="crt-options" role="radiogroup" aria-label="Задание 3">
          <label class="crt-option"><input type="radio" name="crt-q3" value="a"> 50 мин</label>
          <label class="crt-option"><input type="radio" name="crt-q3" value="b"> 47 дней</label>
          <label class="crt-option"><input type="radio" name="crt-q3" value="c"> 40 мин</label>
        </div>
        <button type="button" class="btn-primary crt-send" data-question="3">Готово</button>
        <p class="crt-feedback" id="crt-fb-3" hidden></p>
      </div>

      <div class="crt-score-summary" id="crt-score-summary" hidden role="region" aria-label="Итог теста CRT"></div>

      <div class="complete-row crt-complete" hidden>
        <button type="button" class="btn-primary btn-complete" data-stage="2">Завершить второй этап</button>
        <span class="hint">После просмотра итога нажмите, чтобы открыть этап 3 (перерыв).</span>
      </div>
    </div>
  </template>

  <template id="tpl-stage3-inner">
    <div class="break-panel">
      <h2 class="break-title">Время перерыва</h2>
      <p class="break-desc">Отдыхайте <strong>1 минуту</strong>. Откройте этот этап — запустится таймер. По окончании времени <strong>четвёртый этап</strong> откроется автоматически.</p>
      <div class="break-countdown" role="timer" aria-live="polite" aria-atomic="true">1:00</div>
    </div>
  </template>

  <template id="tpl-stage5-inner">
    <div class="break-panel">
      <h2 class="break-title">Время перерыва</h2>
      <p class="break-desc">Короткий отдых <strong>около 1 минуты</strong>. Откройте этот этап — запустится таймер. По окончании времени <strong>шестой этап</strong> откроется автоматически.</p>
      <div class="break-countdown" role="timer" aria-live="polite" aria-atomic="true">1:00</div>
    </div>
  </template>

  <template id="tpl-stage6-inner">
    <div class="gng-game">
      <div class="gng-desc">
        <h2>Игра на внимание и торможение</h2>
        <p>Нажмите кнопку <strong>«Готовы?»</strong> — затем пойдёт обратный отсчёт: <strong>3, 2, 1</strong>, после чего начнутся попытки.</p>
        <p>В каждой попытке случайная цифра от <strong>1</strong> до <strong>9</strong> показывается <strong>0,5 секунды</strong>, затем на том же месте появляется знак <strong>×</strong> в круге ещё <strong>0,5 секунды</strong>. Ответ засчитывается за всё это время до появления следующей цифры.</p>
        <ul>
          <li>Если цифра <strong>не 3</strong>: нажмите <strong>Пробел</strong> в любой момент, пока видна эта цифра <strong>или</strong> пока виден × (до следующей попытки). Успех — круг станет <span class="gng-green-text">зелёным</span>. Если не нажали — ошибка.</li>
          <li>Если цифра <strong>3</strong>: <strong>не нажимайте</strong> Пробел, пока на экране эта попытка (цифра или ×). Любое нажатие Пробела — ошибка, круг станет <span class="gng-red-text">красным</span>.</li>
        </ul>
        <p>Сначала идут <strong>25 пробных</strong> попыток — после них показывается сводка и список ошибок. Затем нажмите <strong>«Готов к настоящему?»</strong>, чтобы начать <strong>10 основных</strong> попыток. После основного блока снова отображаются итог и ошибки, затем — фейерверк.</p>
      </div>
      <button type="button" class="btn-primary gng-ready">Готовы?</button>
      <div class="gng-countdown-overlay gng-hidden" aria-live="polite"><span class="gng-count-num">3</span></div>
      <div class="gng-arena-wrap gng-hidden">
        <div class="gng-arena">
          <div class="gng-digit" aria-hidden="true"></div>
          <div class="gng-mask" aria-hidden="true"><span class="gng-x" aria-hidden="true">×</span></div>
        </div>
        <p class="gng-trial-label"></p>
      </div>
      <div class="gng-practice-break gng-hidden">
        <div class="gng-practice-report" aria-live="polite"></div>
        <button type="button" class="btn-primary gng-start-main">Готов к настоящему?</button>
      </div>
      <div class="gng-results gng-hidden"></div>
      <div class="complete-row gng-stage-complete gng-hidden">
        <button type="button" class="btn-primary btn-complete" data-stage="6">Завершить шестой этап</button>
        <span class="hint">Нажмите, чтобы открыть седьмой этап.</span>
      </div>
    </div>
  </template>

  <template id="tpl-stage7-inner">
    <div class="s7-wrap">
      <h2 class="s7-title">Опрос (седьмой этап)</h2>
      <p class="s7-intro placeholder-stage">Ниже — структура формы: позже сюда подставят точный текст вопроса и формулировки четырёх ответов. Сейчас используются заглушки.</p>
      <form class="s7-form" id="stage7-quiz-form">
        <p class="s7-question" id="s7-q-label">[Текст вопроса будет добавлен позже]</p>
        <fieldset class="s7-fieldset">
          <legend class="s7-legend">Отметьте один вариант ответа</legend>
          <div class="s7-options" role="radiogroup" aria-labelledby="s7-q-label">
            <label class="s7-option">
              <input type="radio" name="stage7_answer" value="opt1">
              <span>Вариант 1 — заглушка</span>
            </label>
            <label class="s7-option">
              <input type="radio" name="stage7_answer" value="opt2">
              <span>Вариант 2 — заглушка</span>
            </label>
            <label class="s7-option">
              <input type="radio" name="stage7_answer" value="opt3">
              <span>Вариант 3 — заглушка</span>
            </label>
            <label class="s7-option">
              <input type="radio" name="stage7_answer" value="opt4">
              <span>Вариант 4 — заглушка</span>
            </label>
          </div>
        </fieldset>
        <button type="button" class="btn-primary s7-submit">Отправить ответ</button>
        <p class="s7-feedback" hidden></p>
      </form>
      <div class="complete-row">
        <button type="button" class="btn-primary btn-complete" data-stage="7">Завершить седьмой этап</button>
        <span class="hint">Курс на этом заканчивается. Сначала при желании отправьте ответ в форме выше.</span>
      </div>
    </div>
  </template>

  <template id="tpl-stage4-inner">
    <div class="stage4-inner">
      <div class="crt-metrics-panel" data-crt-summary aria-live="polite"></div>
      <div class="stroop-embed">
        <h2 id="_run_the_demo">Запустить демонстрацию</h2>
        <div class="admonitionblock note">
          <table>
            <tr>
              <td class="icon">
                <span class="admon-icon" title="Примечание" aria-hidden="true">i</span>
              </td>
              <td class="content">
                В этом примере вы увидите цветные слова (как <strong><font color="#0A0">ЗЕЛЁНЫЙ</font></strong>, или <strong><font color="#A00">СИНИЙ</font></strong>). Вам нужно ответить на цвет
                слов (не на значение), нажав соответствующую клавишу (к,з,с,ж для
                красного, зелёного, синего и жёлтого стимулов).
              </td>
            </tr>
          </table>
        </div>
        <div class="sidebarblock">
          <div class="content">
            <div class="stroop-launch-wrap">
              <img
                class="stroop-launch-img"
                src="x1.png"
                alt="Иллюстрация к демонстрации Струпа"
                decoding="async"
                loading="lazy"
              />
              <p class="stroop-launch-link">
                <a href="experiment_stroop.html" target="_blank" rel="noopener">Нажмите здесь, чтобы запустить демонстрацию задачи Струпа</a>
              </p>
            </div>
          </div>
        </div>

        <h2 id="_data_output_file">Выходной файл данных</h2>
        <div class="admonitionblock tip">
          <table>
            <tr>
              <td class="icon">
                <span class="admon-icon" title="Совет" aria-hidden="true">!</span>
              </td>
              <td class="content">
                В PsyToolkit выходной файл данных — это просто текстовый файл. Строка
                <strong>save</strong> в сценарии эксперимента PsyToolkit определяет, что
                сохраняется в выходном файле данных. Обычно для каждого экспериментального
                испытания у вас будет ровно одна строка в текстовом файле, и каждое
                число/слово на этой строке дает вам информацию, необходимую для

              <td class="tableblock halign-left valign-top"><p class="tableblock">7</p></td>

  <script>
    (function () {
      var STORAGE_KEY = "courseMaxUnlockedStage";
      var STAGE1_SHORTS_DONE_KEY = "courseStage1AllShortsWatched";
      var STAGE1_LONG_KEY = "courseStage1LongVideoVisited";
      var CRT_METRICS_KEY = "courseCRTMetricsLast";
      var crtOnStage2Open = function () {};
      var STAGE_LABELS = [
        "Первый этап",
        "Второй этап",
        "Третий этап",
        "Четвёртый этап",
        "Пятый этап",
        "Шестой этап",
        "Седьмой этап"
      ];
      var tplStage1 = document.getElementById("tpl-stage1-inner");
      var tplStage2 = document.getElementById("tpl-stage2-inner");
      var tplStage3 = document.getElementById("tpl-stage3-inner");
      var tplStage4 = document.getElementById("tpl-stage4-inner");
      var tplStage5 = document.getElementById("tpl-stage5-inner");
      var tplStage6 = document.getElementById("tpl-stage6-inner");
      var tplStage7 = document.getElementById("tpl-stage7-inner");
      var stage3Break = { intervalId: null };
      var stage5Break = { intervalId: null };

      function clearStage3BreakTimer() {
        if (stage3Break.intervalId) {
          clearInterval(stage3Break.intervalId);
          stage3Break.intervalId = null;
        }
      }

      function clearStage5BreakTimer() {
        if (stage5Break.intervalId) {
          clearInterval(stage5Break.intervalId);
          stage5Break.intervalId = null;
        }
      }

      function notifyStageOpened(sid) {
        setTimeout(function () {
          var st = document.querySelector('.stage[data-stage="' + sid + '"]');
          if (!st || !st.classList.contains("is-open")) return;
          if (sid === "3") maybeStartStage3Timer();
          if (sid === "5") maybeStartStage5Timer();
          if (sid === "2") crtOnStage2Open();
          if (sid === "1") {
            requestAnimationFrame(function () {
              tryEnterStage1ShortFullscreen();
            });
          }
        }, 0);
      }

      function expandStageByNumber(numStr) {
        document.querySelectorAll("#stages .stage.is-locked.is-open").forEach(function (el) {
          el.classList.remove("is-open");
          var hh = el.querySelector(".stage-head");
          if (hh && hh.getAttribute("aria-expanded") != null) {
            hh.setAttribute("aria-expanded", "false");
          }
        });
        var st = document.querySelector('.stage[data-stage="' + numStr + '"]');
        if (!st || st.classList.contains("is-locked")) return;
        document.querySelectorAll("#stages .stage.is-open").forEach(function (el) {
          el.classList.remove("is-open");
          var hh = el.querySelector(".stage-head");
          if (hh) hh.setAttribute("aria-expanded", "false");
        });
        st.classList.add("is-open");
        var h = st.querySelector(".stage-head");
        if (h) h.setAttribute("aria-expanded", "true");
        notifyStageOpened(numStr);
      }

      function finishStage3Break() {
        clearStage3BreakTimer();
        setMaxUnlocked(Math.max(getMaxUnlocked(), 4));
        render();
      }

      function maybeStartStage3Timer() {
        if (getMaxUnlocked() >= 4) return;
        var st = document.querySelector('.stage[data-stage="3"]');
        if (!st || st.classList.contains("is-locked")) return;
        if (!st.querySelector(".break-countdown")) return;
        if (stage3Break.intervalId) return;

        var remain = 60;
        function tick() {
          var m = Math.floor(remain / 60);
          var s = remain % 60;
          var text = m + ":" + (s < 10 ? "0" : "") + s;
          var el = document.querySelector('.stage[data-stage="3"] .break-countdown');
          if (el) el.textContent = text;
          if (remain <= 0) {
            finishStage3Break();
            return;
          }
          remain--;
        }
        tick();
        stage3Break.intervalId = setInterval(tick, 1000);
      }

      function finishStage5Break() {
        clearStage5BreakTimer();
        setMaxUnlocked(Math.max(getMaxUnlocked(), 6));
        render();
      }

      function maybeStartStage5Timer() {
        if (getMaxUnlocked() >= 6) return;
        var st = document.querySelector('.stage[data-stage="5"]');
        if (!st || st.classList.contains("is-locked")) return;
        if (!st.querySelector(".break-countdown")) return;
        if (stage5Break.intervalId) return;

        var remain = 60;
        function tick() {
          var m = Math.floor(remain / 60);
          var s = remain % 60;
          var text = m + ":" + (s < 10 ? "0" : "") + s;
          var el = document.querySelector('.stage[data-stage="5"] .break-countdown');
          if (el) el.textContent = text;
          if (remain <= 0) {
            finishStage5Break();
            return;
          }
          remain--;
        }
        tick();
        stage5Break.intervalId = setInterval(tick, 1000);
      }

      function getMaxUnlocked() {
        var n = parseInt(localStorage.getItem(STORAGE_KEY), 10);
        if (!isFinite(n) || n < 1) return 1;
        return Math.min(7, Math.max(1, n));
      }

      function setMaxUnlocked(n) {
        localStorage.setItem(STORAGE_KEY, String(Math.min(7, Math.max(1, n))));
      }

      function hasStage1ShortsCompleted() {
        try {
          return localStorage.getItem(STAGE1_SHORTS_DONE_KEY) === "1";
        } catch (err) {
          return false;
        }
      }

      function markStage1ShortsCompleted() {
        try {
          localStorage.setItem(STAGE1_SHORTS_DONE_KEY, "1");
        } catch (err) {}
      }

      function hasStage1LongVideoVisited() {
        try {
          return localStorage.getItem(STAGE1_LONG_KEY) === "1";
        } catch (err) {
          return false;
        }
      }

      function markStage1LongVideoVisited() {
        try {
          localStorage.setItem(STAGE1_LONG_KEY, "1");
        } catch (err) {}
      }

      var stage1ShortFsScrollY = 0;

      function isStage1TouchFullscreenDevice() {
        try {
          return window.matchMedia("(hover: none) and (pointer: coarse)").matches;
        } catch (err) {
          return false;
        }
      }

      function exitStage1ShortFullscreen() {
        var wasFs = document.body.classList.contains("stage1-short-fs-active");
        var shell = document.getElementById("stage1-short-fs-shell");
        var mount = document.getElementById("stage1-short-fs-mount");
        if (shell && shell.classList.contains("stage1-short-fs-shell--open")) {
          shell.classList.remove("stage1-short-fs-shell--open");
          shell.removeAttribute("aria-modal");
          shell.removeAttribute("role");
          shell.removeAttribute("aria-label");
        }
        if (shell && mount && shell.parentNode === document.body) {
          mount.appendChild(shell);
        }
        document.body.classList.remove("stage1-short-fs-active");
        document.body.style.position = "";
        document.body.style.top = "";
        document.body.style.left = "";
        document.body.style.right = "";
        document.body.style.width = "";
        document.body.style.touchAction = "";
        if (wasFs) {
          window.scrollTo(0, stage1ShortFsScrollY);
        }
      }

      function tryEnterStage1ShortFullscreen() {
        if (!isStage1TouchFullscreenDevice()) return;
        if (hasStage1ShortsCompleted()) return;
        var st = document.querySelector('.stage[data-stage="1"]');
        if (!st || st.classList.contains("is-locked") || !st.classList.contains("is-open")) return;
        var shortPanel = st.querySelector('.video-panel[data-panel="short"]');
        if (!shortPanel || !shortPanel.classList.contains("is-active")) return;
        var shell = document.getElementById("stage1-short-fs-shell");
        var mount = document.getElementById("stage1-short-fs-mount");
        if (!shell || !mount) return;
        if (shell.classList.contains("stage1-short-fs-shell--open")) return;

        shell.classList.add("stage1-short-fs-shell--open");
        shell.setAttribute("role", "dialog");
        shell.setAttribute("aria-modal", "true");
        shell.setAttribute("aria-label", "Короткие видео");
        document.body.appendChild(shell);
        stage1ShortFsScrollY = window.scrollY || window.pageYOffset || 0;
        document.body.classList.add("stage1-short-fs-active");
        document.body.style.position = "fixed";
        document.body.style.top = -stage1ShortFsScrollY + "px";
        document.body.style.left = "0";
        document.body.style.right = "0";
        document.body.style.width = "100%";
      }

      /** maxUnlocked — номер последнего открытого этапа; этап N доступен только при maxUnlocked ≥ N. */
      function updateCompleteButtonsState() {
        var max = getMaxUnlocked();
        var crtScoreEl = document.getElementById("crt-score-summary");
        document.querySelectorAll(".btn-complete").forEach(function (btn) {
          var s = parseInt(btn.getAttribute("data-stage"), 10);
          if (!isFinite(s)) return;
          var disabled = s < max;
          if (!disabled && s === 1 && max === 1) {
            disabled = !hasStage1ShortsCompleted() || !hasStage1LongVideoVisited();
          }
          if (s === 2) {
            if (max < 2) disabled = true;
            else if (max > 2) disabled = true;
            else {
              disabled = !(crtScoreEl && !crtScoreEl.hidden);
            }
          }
          btn.disabled = disabled;
          if (s === 1 && max === 1) {
            if (!hasStage1ShortsCompleted()) {
              btn.setAttribute(
                "title",
                "Сначала просмотрите все семь коротких роликов."
              );
            } else if (!hasStage1LongVideoVisited()) {
              btn.setAttribute(
                "title",
                "Откройте вкладку «Длинный видеоролик», затем нажмите эту кнопку."
              );
            } else {
              btn.removeAttribute("title");
            }
          } else {
            btn.removeAttribute("title");
          }
        });
      }

      function fillCRTMetricsPanel(container) {
        var el = container.querySelector("[data-crt-summary]");
        if (!el) return;
        var raw = null;
        try {
          raw = localStorage.getItem(CRT_METRICS_KEY);
        } catch (err) {
          raw = null;
        }
        if (!raw) {
          el.innerHTML =
            '<p class="placeholder-stage" style="margin:0">После этапа 2 здесь появятся: общий итог (верно / неверно), варианты ответов и время реакции по заданиям.</p>';
          return;
        }
        var d = JSON.parse(raw);
        var html = '<h3 class="crt-metrics-title">Собранные данные (тест CRT, этап 2)</h3>';
        if (d.correctCount != null) {
          var w =
            d.wrongCount != null
              ? d.wrongCount
              : Math.max(0, (d.total != null ? d.total : 3) - d.correctCount);
          html +=
            "<p><strong>Верных ответов:</strong> " +
            d.correctCount +
            " из " +
            (d.total != null ? d.total : 3) +
            ". <strong>Неверных:</strong> " +
            w +
            ".</p>";
        } else {
          html +=
            "<p><strong>Ответы зафиксированы</strong> (" +
            (d.total != null ? d.total : 3) +
            " задания).</p>";
        }
        html += "<p><strong>Время до щелчка по ответу (рефлекс), мс:</strong></p>" + '<ul class="crt-metrics-list">';
        (d.byQuestion || []).forEach(function (x) {
          var choice =
            x.choice != null
              ? x.choice
              : x.correct !== undefined
                ? "(старый формат)"
                : "—";
          html +=
            "<li>Задание " +
            x.q +
            ": " +
            (x.reactionMs != null ? x.reactionMs + " мс" : "—") +
            "; вариант <strong>" +
            choice +
            "</strong></li>";
        });
        html += "</ul>";
        if (d.at) html += '<p class="hint">Запись: ' + d.at + "</p>";
        el.innerHTML = html;
      }

      function showCelebrationOverlay(opts) {
        opts = opts || {};
        var headline = opts.headline || "";
        var sublines = opts.sublines || [];

        var overlay = document.createElement("div");
        overlay.className = "celebration-overlay";
        overlay.setAttribute("role", "dialog");
        overlay.setAttribute("aria-modal", "true");

        var textWrap = document.createElement("div");
        textWrap.className = "celebration-text-wrap";
        var hEl = document.createElement("div");
        hEl.className = "celebration-headline";
        hEl.textContent = headline;
        textWrap.appendChild(hEl);
        sublines.forEach(function (line) {
          var lineEl = document.createElement("div");
          lineEl.className = "celebration-line";
          lineEl.textContent = line;
          textWrap.appendChild(lineEl);
        });

        var reduceMotion =
          window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        if (reduceMotion) {
          overlay.classList.add("celebration-simple");
          overlay.appendChild(textWrap);
          document.body.appendChild(overlay);
          setTimeout(function () {
            overlay.classList.add("celebration-fade-out");
            setTimeout(function () {
              if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
            }, 700);
          }, 2200);
          return;
        }

        var canvas = document.createElement("canvas");
        canvas.className = "celebration-canvas";
        overlay.appendChild(canvas);
        overlay.appendChild(textWrap);
        document.body.appendChild(overlay);

        var c2d;
        try {
          c2d = canvas.getContext("2d", { alpha: true, desynchronized: true });
        } catch (err1) {
          c2d = null;
        }
        if (!c2d) c2d = canvas.getContext("2d");
        var dpr = Math.min(window.devicePixelRatio || 1, 1.75);
        var particles = [];
        var MAX_PARTICLES = 380;
        var FIREWORK_MS = 2800;
        var start = performance.now();
        var lastBurstT = 0;

        var W = window.innerWidth;
        var H = window.innerHeight;
        var resizeT = null;

        function syncSize() {
          W = window.innerWidth;
          H = window.innerHeight;
          canvas.width = (W * dpr) | 0;
          canvas.height = (H * dpr) | 0;
          canvas.style.width = W + "px";
          canvas.style.height = H + "px";
          c2d.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function onResize() {
          if (resizeT) clearTimeout(resizeT);
          resizeT = setTimeout(syncSize, 100);
        }

        function burst(x, y) {
          var palette = [
            "#ff6b6b",
            "#ffd43b",
            "#69db7c",
            "#4dabf7",
            "#ff922b",
            "#da77f2",
            "#ffe066",
            "#fcc419",
            "#ffec99",
            "#ffffff"
          ];
          var c0 = palette[(Math.random() * palette.length) | 0];
          var room = MAX_PARTICLES - particles.length;
          if (room < 12) return;
          var n = Math.min(55 + ((Math.random() * 45) | 0), room - 10);
          for (var i = 0; i < n; i++) {
            var ang = Math.random() * Math.PI * 2;
            var sp = 2 + Math.random() * 7;
            particles.push({
              x: x,
              y: y,
              vx: Math.cos(ang) * sp,
              vy: Math.sin(ang) * sp,
              life: 1,
              decay: 0.008 + Math.random() * 0.03,
              g: 0.07 + Math.random() * 0.05,
              color: Math.random() < 0.4 ? c0 : palette[(Math.random() * palette.length) | 0],
              size: 1.2 + Math.random() * 2.4
            });
          }
          var extra = Math.min(14, MAX_PARTICLES - particles.length);
          for (var s = 0; s < extra; s++) {
            var a2 = Math.random() * Math.PI * 2;
            var sp2 = 0.5 + Math.random() * 2.5;
            particles.push({
              x: x,
              y: y,
              vx: Math.cos(a2) * sp2,
              vy: Math.sin(a2) * sp2,
              life: 1,
              decay: 0.022 + Math.random() * 0.038,
              g: 0.02,
              color: "#ffffff",
              size: 0.7 + Math.random() * 1.1
            });
          }
        }

        function spawnRandomBurst() {
          var x = W * (0.12 + Math.random() * 0.76);
          var y = H * (0.06 + Math.random() * 0.48);
          burst(x, y);
        }

        function frame(now) {
          var elapsed = now - start;

          c2d.fillStyle = "rgba(8, 4, 26, 0.22)";
          c2d.fillRect(0, 0, W, H);

          if (elapsed < FIREWORK_MS && particles.length < MAX_PARTICLES - 40) {
            if (now - lastBurstT > 220 + Math.random() * 280) {
              spawnRandomBurst();
              lastBurstT = now;
            }
          }

          if (particles.length > MAX_PARTICLES) {
            particles.splice(0, particles.length - MAX_PARTICLES);
          }

          for (var i = particles.length - 1; i >= 0; i--) {
            var p = particles[i];
            p.vy += p.g;
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= 0.992;
            p.life -= p.decay;
            if (p.life <= 0 || p.y > H + 80 || p.x < -80 || p.x > W + 80) {
              particles.splice(i, 1);
              continue;
            }
            c2d.globalAlpha = Math.min(1, p.life);
            c2d.fillStyle = p.color;
            c2d.beginPath();
            c2d.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            c2d.fill();
          }
          c2d.globalAlpha = 1;

          var keepGoing = elapsed < FIREWORK_MS + 1200 && (particles.length > 0 || elapsed < FIREWORK_MS);
          if (keepGoing) {
            requestAnimationFrame(frame);
          } else {
            overlay.classList.add("celebration-fade-out");
            setTimeout(function () {
              window.removeEventListener("resize", onResize);
              if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
            }, 700);
          }
        }

        syncSize();
        window.addEventListener("resize", onResize);
        spawnRandomBurst();
        requestAnimationFrame(frame);
      }

      function bindStage1ShortFeed() {
        var video = document.getElementById("stage1-short-video");
        var feed = document.getElementById("stage1-short-feed");
        var touchEl = document.getElementById("stage1-short-touch");
        var miss = document.getElementById("stage1-short-miss");
        var badge = document.getElementById("stage1-short-badge");
        var gotoLongBtn = document.getElementById("stage1-goto-long-video");
        var nextHint = document.getElementById("stage1-short-next-hint");
        if (!video || !feed || !touchEl || !miss || !badge || !nextHint || !gotoLongBtn) return;

        var SHORT_TOTAL = 7;
        var current = 0;
        var NEAR_END_SEC = 3.5;
        var SWIPE_MIN = 52;
        var ignoreEndedUntil = 0;
        var shortsFinishUIShown = false;
        var lastVideoUiSync = 0;
        var VIDEO_UI_THROTTLE_MS = 200;

        function showShortsFinishedUI() {
          if (shortsFinishUIShown) return;
          exitStage1ShortFullscreen();
          shortsFinishUIShown = true;
          gotoLongBtn.hidden = false;
          nextHint.hidden = true;
          markStage1ShortsCompleted();
          updateCompleteButtonsState();
        }

        function syncNextHint() {
          var hasNext = current < SHORT_TOTAL - 1;
          if (!hasNext || !video.duration || !isFinite(video.duration)) {
            nextHint.hidden = true;
            return;
          }
          var left = video.duration - video.currentTime;
          nextHint.hidden = left > NEAR_END_SEC || video.ended;
        }

        function onVideoTimeUpdate() {
          var now = performance.now();
          if (now - lastVideoUiSync >= VIDEO_UI_THROTTLE_MS) {
            lastVideoUiSync = now;
            syncNextHint();
          }
          if (Date.now() < ignoreEndedUntil) return;
          if (current !== SHORT_TOTAL - 1) return;
          if (!video.duration || !isFinite(video.duration)) return;
          var r = video.duration - video.currentTime;
          if (video.ended || r <= 0.18) {
            showShortsFinishedUI();
          }
        }

        function loadIndex(i, opts) {
          opts = opts || {};
          var keepDone = opts.keepDoneUI === true;
          var scrollLock = window.scrollY;
          ignoreEndedUntil = Date.now() + 520;
          lastVideoUiSync = 0;
          current = Math.max(0, Math.min(SHORT_TOTAL - 1, i));
          if (!keepDone) {
            gotoLongBtn.hidden = true;
            shortsFinishUIShown = false;
          }
          miss.hidden = true;
          nextHint.hidden = true;
          video.style.display = "";
          video.pause();
          video.src = "short_video/" + (current + 1) + ".mp4";
          video.load();
          badge.textContent = current + 1 + " / " + SHORT_TOTAL;
          if (opts.autoplay === false) {
            function seekToNearEnd() {
              if (video.duration && isFinite(video.duration)) {
                try {
                  video.currentTime = Math.max(0, video.duration - 0.08);
                } catch (err) {}
              }
              video.pause();
            }
            if (video.readyState >= 1) seekToNearEnd();
            else video.addEventListener("loadedmetadata", seekToNearEnd, { once: true });
            requestAnimationFrame(function () {
              window.scrollTo(0, scrollLock);
            });
          } else {
            function restoreScrollAfterClip() {
              requestAnimationFrame(function () {
                window.scrollTo(0, scrollLock);
              });
            }
            var playP;
            try {
              playP = video.play();
            } catch (err) {
              playP = null;
            }
            if (playP && typeof playP.then === "function") {
              playP
                .catch(function () {
                  video.muted = true;
                  try {
                    return video.play();
                  } catch (e2) {
                    return Promise.resolve();
                  }
                })
                .then(restoreScrollAfterClip, restoreScrollAfterClip);
            } else {
              try {
                video.muted = true;
                video.play();
              } catch (e3) {}
              restoreScrollAfterClip();
            }
          }
        }

        function goNext() {
          if (current < SHORT_TOTAL - 1) loadIndex(current + 1);
        }

        function goPrev() {
          if (current > 0) loadIndex(current - 1);
        }

        video.addEventListener("ended", function () {
          if (Date.now() < ignoreEndedUntil) return;
          if (current < SHORT_TOTAL - 1) {
            loadIndex(current + 1);
          } else {
            showShortsFinishedUI();
          }
        });

        video.addEventListener("timeupdate", onVideoTimeUpdate);
        video.addEventListener("loadedmetadata", syncNextHint);
        video.addEventListener("play", syncNextHint);

        nextHint.addEventListener("mousedown", function (e) {
          e.preventDefault();
        });
        nextHint.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          goNext();
        });

        video.addEventListener("error", function () {
          miss.textContent =
            "Файл short_video/" +
            (current + 1) +
            ".mp4 не найден или не воспроизводится. Через 2 с — переход к следующему (если есть).";
          miss.hidden = false;
          nextHint.hidden = true;
          if (current < SHORT_TOTAL - 1) {
            setTimeout(function () {
              loadIndex(current + 1);
            }, 2000);
          } else {
            showShortsFinishedUI();
          }
        });

        var touchY0 = null;
        var swipeTrack = null;
        touchEl.addEventListener(
          "touchstart",
          function (e) {
            if (!e.targetTouches || e.targetTouches.length !== 1) {
              touchY0 = null;
              swipeTrack = null;
              return;
            }
            var t = e.targetTouches[0];
            touchY0 = t.clientY;
            swipeTrack = { x0: t.clientX, y0: t.clientY };
          },
          { passive: true }
        );
        touchEl.addEventListener(
          "touchmove",
          function (e) {
            if (!swipeTrack || !e.targetTouches || e.targetTouches.length !== 1) return;
            var t = e.targetTouches[0];
            var dy = t.clientY - swipeTrack.y0;
            var dx = t.clientX - swipeTrack.x0;
            if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 10) {
              e.preventDefault();
            }
          },
          { passive: false }
        );
        function onShortTouchEnd(e) {
          swipeTrack = null;
          if (touchY0 == null || !e.changedTouches || !e.changedTouches[0]) {
            touchY0 = null;
            return;
          }
          var dy = touchY0 - e.changedTouches[0].clientY;
          touchY0 = null;
          if (dy > SWIPE_MIN) goNext();
          else if (dy < -SWIPE_MIN) goPrev();
        }
        touchEl.addEventListener("touchend", onShortTouchEnd, { passive: true });
        touchEl.addEventListener(
          "touchcancel",
          function () {
            swipeTrack = null;
            touchY0 = null;
          },
          { passive: true }
        );

        if (hasStage1ShortsCompleted()) {
          shortsFinishUIShown = true;
          loadIndex(SHORT_TOTAL - 1, { keepDoneUI: true, autoplay: false });
          gotoLongBtn.hidden = false;
          updateCompleteButtonsState();
        } else {
          loadIndex(0);
        }
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            tryEnterStage1ShortFullscreen();
          });
        });
      }

      function render() {
        exitStage1ShortFullscreen();
        var maxUnlocked = getMaxUnlocked();
        var root = document.getElementById("stages");
        root.innerHTML = "";
        for (var i = 0; i < 7; i++) {
          var stageNum = i + 1;
          var locked = stageNum > maxUnlocked;
          var el = document.createElement("section");
          el.className = "stage" + (locked ? " is-locked" : "");
          el.dataset.stage = String(stageNum);
          if (locked) el.setAttribute("inert", "");

          var head = locked ? document.createElement("div") : document.createElement("button");
          if (!locked) head.type = "button";
          head.className = "stage-head";
          if (locked) {
            head.setAttribute("role", "group");
            head.setAttribute("aria-label", "Этап " + stageNum + " — закрыто");
          } else {
            head.setAttribute("aria-expanded", "false");
          }

          var titleRow = document.createElement("div");
          titleRow.className = "stage-title-row";
          var num = document.createElement("span");
          num.className = "stage-num";
          num.textContent = String(stageNum);
          var title = document.createElement("span");
          title.textContent = STAGE_LABELS[i];
          titleRow.appendChild(num);
          titleRow.appendChild(title);

          var chev = document.createElement("span");
          chev.className = "chev";
          chev.setAttribute("aria-hidden", "true");
          chev.textContent = locked ? "🔒" : "▼";

          head.appendChild(titleRow);
          if (locked) {
            var badge = document.createElement("span");
            badge.className = "badge-locked";
            badge.textContent = "Закрыто";
            head.appendChild(badge);
            head.setAttribute(
              "title",

            );
          }

          var body = document.createElement("div");
          body.className = "stage-body";
          if (locked) {
            body.innerHTML =
              '<p class="stage-locked-msg" role="status">Этап закрыт. Сначала завершите все предыдущие этапы — он откроется автоматически.</p>';
          } else if (i === 0) {
            body.appendChild(tplStage1.content.cloneNode(true));
          } else if (i === 1) {
            body.appendChild(tplStage2.content.cloneNode(true));
          } else if (i === 2) {
            if (maxUnlocked >= 4) {
              body.innerHTML =
                '<div class="break-panel break-done">' +
                '<h2 class="break-title">Время перерыва</h2>' +
                '<p class="break-desc">Перерыв завершён. Четвёртый этап открыт.</p>' +
                "</div>";
            } else {
              body.appendChild(tplStage3.content.cloneNode(true));
            }
          } else if (i === 3) {
            body.appendChild(tplStage4.content.cloneNode(true));
            fillCRTMetricsPanel(body);
          } else if (i === 4) {
            if (maxUnlocked >= 6) {
              body.innerHTML =
                '<div class="break-panel break-done">' +
                '<h2 class="break-title">Время перерыва</h2>' +
                '<p class="break-desc">Перерыв завершён. Шестой этап открыт.</p>' +
                "</div>";
            } else {
              body.appendChild(tplStage5.content.cloneNode(true));
            }
          } else if (i === 5) {
            body.appendChild(tplStage6.content.cloneNode(true));
          } else if (i === 6) {
            body.appendChild(tplStage7.content.cloneNode(true));
          }

          el.appendChild(head);
          el.appendChild(body);
          root.appendChild(el);
        }

        bindStageToggles();
        bindTabs();
        bindStage1GotoLong();
        bindStage1ShortFeed();
        bindCRT();
        bindGoNogoGame();
